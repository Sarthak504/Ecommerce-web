<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OtakuSip</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#020617;color:#fff}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#020617;
}

/* CART ICON (FIXED) */
.cart-btn{
  position:relative;
  cursor:pointer;
  font-size:18px;
  padding:8px 14px;
  background:#0f172a;
  border-radius:10px;
}

.cart-count{
  position:absolute;
  top:-6px;
  right:-6px;
  background:#ff4757;
  font-size:11px;
  padding:3px 6px;
  border-radius:50%;
}

/* HERO */
.hero{
  height:60vh;
  background:url('https://i.ibb.co/Lzt9b2kK/anime-style-character-with-lit-torch.jpg') center/cover;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#0f172a;
  padding:10px;
  border-radius:10px;
}
.card img{width:100%;border-radius:8px}
.card button{
  width:100%;
  margin-top:8px;
  background:#ff4757;
  border:none;
  padding:8px;
  border-radius:6px;
  color:#fff;
}

/* CART PANEL */
.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#020617;
  max-height:80vh;
  transform:translateY(100%);
  transition:0.3s;
  padding:15px;
}
.cart.open{transform:translateY(0)}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px 20px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<header>
  <h2>OtakuSip</h2>
  <div class="cart-btn" onclick="toggleCart()">
    🛒 Cart
    <span class="cart-count" id="count">0</span>
  </div>
</header>

<div class="hero"></div>

<div class="products" id="products"></div>

<div class="cart" id="cart">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <h4>Total: ₹<span id="total">0</span></h4>
</div>

<div class="toast" id="toast"></div>

<script>

/* PRODUCTS (ALL 6 INCLUDED) */
const products = [
{name:"Shadow Hokage Mug",price:699,img:"https://i.ibb.co/60NNFZc8/Gemini-Generated-Image-35t55e35t55e35t5.png"},
{name:"Blue Shinobi Edition",price:649,img:"https://i.ibb.co/xKZ211Xs/Gemini-Generated-Image-7fspq87fspq87fsp-1.png"},
{name:"Ocean Spirit Anime Mug",price:649,img:"https://i.ibb.co/Ps7X2ycq/Gemini-Generated-Image-ixgrorixgrorixgr.png"},
{name:"Vintage Warrior Mug",price:699,img:"https://i.ibb.co/0pPx976F/Gemini-Generated-Image-fr0xjwfr0xjwfr0x.png"},
{name:"Flame Curse Edition",price:799,img:"https://i.ibb.co/k694VZgW/Gemini-Generated-Image-e68fpme68fpme68f.png"},
{name:"Rogue Ninja Black Mug",price:749,img:"https://i.ibb.co/zWh63kqr/Gemini-Generated-Image-i7okaei7okaei7ok.png"}
];

let cart = [];

/* RENDER PRODUCTS */
function renderProducts(){
  document.getElementById("products").innerHTML =
  products.map((p,i)=>`
    <div class="card">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      ₹${p.price}
      <button onclick="addToCart(${i})">Add to Cart</button>
    </div>
  `).join('');
}

/* ADD TO CART (FIXED LOGIC) */
function addToCart(i){
  let existing = cart.find(x => x.name === products[i].name);

  if(existing){
    existing.qty++;
  }else{
    cart.push({...products[i], qty:1});
  }

  updateCart();
  showToast("Added to cart 🛒");
}

/* UPDATE CART */
function updateCart(){
  document.getElementById("count").innerText =
    cart.reduce((a,b)=>a+b.qty,0);

  let total = 0;
  let html = "";

  if(cart.length===0){
    html = "<p style='text-align:center;color:gray;'>Cart is empty</p>";
  }

  cart.forEach((item,i)=>{
    total += item.price * item.qty;

    html += `
    <div class="cart-item">
      <div>
        ${item.name}<br>
        ₹${item.price} × ${item.qty}
      </div>
      <div>
        <button onclick="changeQty(${i},1)">+</button>
        <button onclick="changeQty(${i},-1)">-</button>
      </div>
    </div>`;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = total;
}

/* CHANGE QTY */
function changeQty(i,val){
  cart[i].qty += val;
  if(cart[i].qty<=0) cart.splice(i,1);
  updateCart();
}

/* TOGGLE CART */
function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
}

/* TOAST */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",2000);
}

renderProducts();

</script>

</body>
</html>
